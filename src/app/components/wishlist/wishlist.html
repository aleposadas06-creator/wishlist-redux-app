<div class="page">
  <div class="card">

    <div class="header">
      <h1>Mi Wishlist</h1>
      <p>Agrega metas o experiencias que quieres lograr.</p>
    </div>

    <app-wishlist-form
      (itemCreated)="onItemCreated($event)">
    </app-wishlist-form>

    <div class="items">
      <app-wishlist-item
        *ngFor="let item of wishlist$ | async"
        [item]="item">
      </app-wishlist-item>
    </div>

  </div>

</div>
