<div class="page">
  <div class="card">

    <div class="header">
      <h1>Mi Wishlist</h1>
      <p>Agrega metas o experiencias que quieres lograr.</p>
    </div>

    <app-wishlist-form
      (itemCreated)="onItemCreated($event)">
    </app-wishlist-form>

    <div class="items">
      <app-wishlist-item
        *ngFor="let item of wishlist$ | async"
        [item]="item">
      </app-wishlist-item>
    </div>

    <hr>

    <h2>Mapa de destinos</h2>

    <app-mapa></app-mapa>

    <hr>

    <div class="tracking-panel">
      <h3>Tracking de clicks</h3>

      <p>👍 Upvote clicks: {{ (tracking$ | async)?.upvote }}</p>
      <p>👎 Downvote clicks: {{ (tracking$ | async)?.downvote }}</p>
      <p>🗑 Delete clicks: {{ (tracking$ | async)?.delete }}</p>
    </div>

  </div>
</div>
